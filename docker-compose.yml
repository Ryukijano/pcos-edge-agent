# PCOS Context Broker — docker-compose
# Run: docker compose up -d

services:
  broker:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - broker-data:/data
    environment:
      - PCOS_BROKER_HOST=0.0.0.0
      - PCOS_BROKER_PORT=8000
      - PCOS_CORS_ORIGINS=["*"]
      # Set PCOS_BRIDGE_TOKEN to require auth on WebSocket bridge
      # - PCOS_BRIDGE_TOKEN=your-secret-token
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/health'); exit(0 if r.status_code==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  broker-data:
