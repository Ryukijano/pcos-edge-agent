# PCOS Context Broker — docker-compose
# Run: docker compose up -d

services:
  broker:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - broker-data:/data
    environment:
      - PCOS_BROKER_HOST=0.0.0.0
      - PCOS_BROKER_PORT=8000
      - PCOS_CORS_ORIGINS=["http://localhost:8000"]
      # Public deployments must provide a secret bridge token.
      - PCOS_BRIDGE_AUTH_REQUIRED=${PCOS_BRIDGE_AUTH_REQUIRED:-false}
      - PCOS_BRIDGE_AUTH_TOKEN=${PCOS_BRIDGE_AUTH_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/health'); exit(0 if r.status_code==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  broker-data:
